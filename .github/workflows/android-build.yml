name: Build Android APK
on:
  push:
    branches: [ main, master ] # זה יפעל בכל פעם שתעלה קוד

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # הגרסה הכי יציבה

      - name: Install dependencies
        run: npm install

      - name: Static HTML Export
        run: npm run build # כאן נוצרת תיקיית ה-out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: out
