name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip project.zip 

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          find . -name "manifest*" -delete || true
          find . -name "capacitor.config.ts" -delete || true
          
          npm install
          npm run build
          
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out
          npx cap add android
          
          # יצירת קובץ Styles
          mkdir -p android/app/src/main/res/values
          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"></style></resources>' > android/app/src/main/res/values/styles.xml

          # יצירת Manifest תקין בשיטה של שורה-שורה למניעת שגיאות תווים
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/AndroidManifest.xml
          echo '<manifest xmlns:android="http://android.com" xmlns:tools="http://android.com">' >> android/app/src/main/AndroidManifest.xml
          echo '  <application android:label="KidsApp" android:theme="@style/AppTheme" tools:replace="android:theme">' >> android/app/src/main/AndroidManifest.xml
          echo '    <activity android:name="com.getcapacitor.BridgeActivity" android:exported="true" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode">' >> android/app/src/main/AndroidManifest.xml
          echo '      <intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '        <action android:name="android.intent.action.MAIN" />' >> android/app/src/main/AndroidManifest.xml
          echo '        <category android:name="android.intent.category.LAUNCHER" />' >> android/app/src/main/AndroidManifest.xml
          echo '      </intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '    </activity>' >> android/app/src/main/AndroidManifest.xml
          echo '  </application>' >> android/app/src/main/AndroidManifest.xml
          echo '</manifest>' >> android/app/src/main/AndroidManifest.xml

          # בניית ה-APK
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "com.myapp.kids"
              compileSdk 35
              defaultConfig {
                  applicationId "com.myapp.kids"
                  minSdkVersion 23
                  targetSdkVersion 35
                  versionCode 1
                  versionName "1.0"
              }
              configurations.all {
                  resolutionStrategy {
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation project(':capacitor-android')
          }
          EOF
          
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-final-kids-app
          path: "**/app-debug.apk"
