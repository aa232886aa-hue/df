name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip project.zip 

      - name: Set up Java 17 # ננסה גרסה 17 שהיא הכי נפוצה לאנדרואיד 8.1
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # ניקוי מוקשים
          find . -name "manifest*" -delete || true
          find . -name "capacitor.config.ts" -delete || true
          
          npm install
          npm run build
          
          # התקנה נקייה של המעטפת
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out
          npx cap add android
          
          # הגדרות תאימות למכשירים ישנים
          sed -i 's/minSdkVersion = .*/minSdkVersion = 22/' android/variables.gradle
          
          cd android
          chmod +x gradlew
          ./gradlew clean # פקודת ניקוי קריטית
          ./gradlew assembleDebug
