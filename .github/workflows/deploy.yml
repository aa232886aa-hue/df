name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Unzip and Build
        run: |
          unzip project.zip
          
          # איתור תיקיית הפרויקט
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # ניקוי קבצים מתנגשים (כולל המניפסט והקובץ שגרם לשגיאה עכשיו)
          find . -name "manifest.*" -delete || true
          rm -f capacitor.config.ts || true
          
          # בניית ה-Web
          npm install
          npm run build
          
          # הקמת המעטפת (כאן זה נתקע קודם)
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out
          npx cap add android
          
          # השתלת המניפסט הידני שלך
          cp ../../AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          
          # יצירת קובץ בנייה
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "com.myapp.kids"
              compileSdk 35
              defaultConfig {
                  applicationId "com.myapp.kids"
                  minSdkVersion 23
                  targetSdkVersion 35
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation project(':capacitor-android')
          }
          EOF
          
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-kids-app
          path: "**/app-debug.apk"
