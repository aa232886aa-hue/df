name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Final Android Build
        run: |
          unzip project.zip
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # ניקוי מוחלט
          rm -rf android ios node_modules out
          rm -f capacitor.config.*
          
          # יצירת out
          mkdir -p out
          echo '<html><head><meta charset="UTF-8"></head><body><h1>App Loaded</h1></body></html>' > out/index.html
          
          # התקנה נקייה
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out
          npx cap add android
          
          # הזרקת המניפסט הידני שלך
          if [ -f "../../AndroidManifest.xml" ]; then
            cp "../../AndroidManifest.xml" android/app/src/main/AndroidManifest.xml
          fi
          
          # שינוי הגדרות גרסה בתוך הקובץ הקיים (במקום להחליף אותו)
          sed -i 's/minSdkVersion = .*/minSdkVersion = 24/' android/variables.gradle
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 34/' android/variables.gradle
          sed -i 's/compileSdkVersion = .*/compileSdkVersion = 34/' android/variables.gradle
          
          # בנייה
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-kids-app
          path: "**/app-debug.apk"
