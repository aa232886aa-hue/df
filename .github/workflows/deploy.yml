name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip project.zip 

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          CONFIG_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$CONFIG_PATH")
          cd "$PROJECT_DIR"
          
          find . -name "manifest*" -delete || true
          find . -name "capacitor.config.ts" -delete || true
          
          npm install
          npm run build
          
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out
          npx cap add android
          
          # הגדרות לתמיכה במכשירים ישנים (אנדרואיד 7 ומעלה)
          sed -i 's/minSdkVersion = .*/minSdkVersion = 24/' android/variables.gradle
          sed -i 's/targetSdk = .*/targetSdk = 34/' android/variables.gradle
          sed -i 's/compileSdk = .*/compileSdk = 34/' android/variables.gradle
          
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-android-apk
          path: "**/app-debug.apk"
