name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean Build and Assemble
        run: |
          unzip project.zip
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # ניקוי מוחלט של כל זכר להגדרות קודמות
          rm -rf android node_modules out capacitor.config.* package-lock.json
          
          # יצירת תיקיית תוכן בסיסית
          mkdir -p out
          echo '<html><body style="background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:sans-serif;"><h1>האפליקציה מוכנה</h1></body></html>' > out/index.html
          
          # התקנה מינימלית של ליבת המעטפת בלבד
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # יצירת הגדרות מעטפת נקיות בפורמט JSON
          echo '{"appId":"com.myapp.kids","appName":"KidsApp","webDir":"out","bundledWebRuntime":false}' > capacitor.config.json
          
          # הוספת פלטפורמת אנדרואיד
          npx cap add android
          
          # תיקון גרסאות והסרת תלויות פלאגינים בעייתיות מקובץ ההגדרות
          sed -i 's/implementation project(":capacitor-cordova-android-plugins")//g' android/app/build.gradle
          sed -i 's/minSdkVersion = .*/minSdkVersion = 24/' android/variables.gradle
          
          # הזרקת המניפסט הידני שלך
          if [ -f "../../AndroidManifest.xml" ]; then
            cp "../../AndroidManifest.xml" android/app/src/main/AndroidManifest.xml
          fi
          
          # בנייה ישירה
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-kids-app
          path: "**/app-debug.apk"
