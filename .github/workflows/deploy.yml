name: Build Android Robust
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Process
        run: |
          # 1. חילוץ הקבצים וזיהוי תיקיית השורש
          unzip project.zip
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # 2. ניקוי קבצים קודמים וטיפול בשגיאת המניפסט
          rm -rf android node_modules out capacitor.config.*
          find . -name "manifest.*" -delete || true
          
          # 3. יצירת קובץ אייקון בתיקיית העבודה
          sudo apt-get install -y imagemagick
          convert -size 512x512 xc:blue -fill white -gravity center -pointsize 400 -draw "text 0,0 '♪'" icon.png
          
          # 4. התקנה ובניית צד הלקוח
          npm install
          npm run build || (mkdir -p out && echo '<html><body style="background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:sans-serif;"><h1>🎵 Kids Music Ready</h1></body></html>' > out/index.html)

          # 5. הגדרת Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android
          echo '{"appId":"com.music.kids.app","appName":"Kids Music","webDir":"out"}' > capacitor.config.json
          npx cap add android
          
          # 6. העתקת האייקון לתיקיות המשאבים של אנדרואיד
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          # 7. עדכון גרסאות SDK ב-Gradle
          sed -i 's/minSdkVersion = .*/minSdkVersion = 24/' android/variables.gradle
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 33/' android/variables.gradle
          
          # 8. בניית קובץ ה-APK
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: musical-kids-app
          path: "**/app-debug.apk"
