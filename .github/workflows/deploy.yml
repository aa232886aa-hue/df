name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ultimate Build
        run: |
          unzip project.zip
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # 1. ניקוי וסידור סביבה
          rm -rf android ios node_modules out capacitor.config.*
          mkdir -p out
          echo '<html><body style="background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;"><h1>App Ready</h1></body></html>' > out/index.html
          
          # 2. התקנה
          npm install @capacitor/core @capacitor/cli @capacitor/android
          echo '{"appId":"com.myapp.kids","appName":"KidsApp","webDir":"out"}' > capacitor.config.json
          npx cap add android
          
          # 3. יצירת קובץ Styles חסר כדי לפתור את שגיאת ה-SplashScreen
          mkdir -p android/app/src/main/res/values
          cat <<EOF > android/app/src/main/res/values/styles.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"></style>
              <style name="Theme.SplashScreen" parent="AppTheme"></style>
          </resources>
          EOF

          # 4. יצירת מניפסט תקין שמשתמש בעיצוב שיצרנו
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com">
              <application
                  android:label="KidsApp"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name="com.getcapacitor.BridgeActivity"
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. תיקון כפילויות וגרסאות (תמיכה באנדרואיד 8.1)
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "com.myapp.kids"
              compileSdk 35
              defaultConfig {
                  applicationId "com.myapp.kids"
                  minSdkVersion 24
                  targetSdkVersion 35
                  versionCode 1
                  versionName "1.0"
              }
              configurations.all {
                  resolutionStrategy {
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                  }
              }
          }
          dependencies {
              implementation project(':capacitor-android')
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # 6. בנייה סופית
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-final-app-apk
          path: "**/app-debug.apk"
