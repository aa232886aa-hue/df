name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Process
        run: |
          # שמירת הנתיב של המניפסט בשורש המאגר
          ROOT_DIR=$(pwd)
          
          unzip project.zip
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # ניקוי
          rm -rf android ios node_modules out capacitor.config.*
          
          # יצירת out
          mkdir -p out
          echo '<html><body><h1>App Ready</h1></body></html>' > out/index.html
          
          # התקנה
          npm install @capacitor/core @capacitor/cli @capacitor/android
          echo '{"appId":"com.myapp.kids","appName":"KidsApp","webDir":"out"}' > capacitor.config.json
          npx cap add android
          
          # 💡 תיקון הנתיב: העתקה מהשורש המקורי של המאגר
          if [ -f "$ROOT_DIR/AndroidManifest.xml" ]; then
            cp "$ROOT_DIR/AndroidManifest.xml" android/app/src/main/AndroidManifest.xml
            echo "Manifest injected successfully from root"
          else
            echo "Error: AndroidManifest.xml not found in root!"
            exit 1
          fi
          
          # יצירת קובץ בנייה
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "com.myapp.kids"
              compileSdk 35
              defaultConfig {
                  applicationId "com.myapp.kids"
                  minSdkVersion 24
                  targetSdkVersion 35
              }
              configurations.all {
                  resolutionStrategy {
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                  }
              }
          }
          dependencies {
              implementation project(':capacitor-android')
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-kids-app
          path: "**/app-debug.apk"
