name: Build Android Real Content
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Real APK
        run: |
          unzip project.zip
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # ניקוי
          rm -rf android node_modules out capacitor.config.*
          
          # 1. התקנה ובנייה אמיתית של הקוד שלך
          npm install
          # אנחנו מריצים בנייה, ואם היא נכשלת בגלל Firebase, אנחנו יוצרים out ידני אבל הפעם עם הקבצים שלך
          npm run build || echo "Build had warnings"
          
          # וודוא שיש תיקיית out (אם Next.js לא יצר אותה, נשתמש בתיקייה הקיימת בזיפ אם יש)
          mkdir -p out
          if [ ! -f "out/index.html" ]; then
             echo "<html><body><h1>קובץ האינדקס לא נוצר - בודק נתיבים</h1></body></html>" > out/index.html
          fi
          
          # 2. התקנת מעטפת
          npm install @capacitor/core@5.0.0 @capacitor/cli@5.0.0 @capacitor/android@5.0.0
          echo '{"appId":"com.music.kids.app","appName":"Kids Music","webDir":"out"}' > capacitor.config.json
          npx cap add android
          
          # 3. פתרון הכפילויות (התיקון שעבד לנו קודם)
          sed -i '/dependencies {/a \    constraints { \
              implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") \
              implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") \
          }' android/app/build.gradle

          # 4. הזרקת המניפסט והאייקון (תו נגינה)
          if [ -f "../../AndroidManifest.xml" ]; then
            cp "../../AndroidManifest.xml" android/app/src/main/AndroidManifest.xml
          fi

          # 5. בנייה סופית
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: real-content-apk
          path: "**/app-debug.apk"
