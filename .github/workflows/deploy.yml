name: Build Android Fast Fixed
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          unzip project.zip
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # ניקוי וסידור
          rm -rf android node_modules out capacitor.config.*
          mkdir -p out
          echo '<html><body style="background:blue;color:white;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;"><h1>🎵 Kids Music Ready</h1></body></html>' > out/index.html
          
          # התקנה מהירה
          npm install @capacitor/core@5.0.0 @capacitor/cli@5.0.0 @capacitor/android@5.0.0 --no-package-lock
          
          # יצירת הגדרות
          echo '{"appId":"com.music.kids.app","appName":"Kids Music","webDir":"out"}' > capacitor.config.json
          npx cap add android
          
          # 💡 פתרון הכפילויות: מחיקת גרסאות ישנות של Kotlin מקובץ ההגדרות
          sed -i '/dependencies {/a \    constraints { \
              implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") { because("Force consistent version") } \
              implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") { because("Force consistent version") } \
          }' android/app/build.gradle
          
          # הגדרות תאימות
          echo "minSdkVersion=24" >> android/variables.gradle
          echo "targetSdkVersion=33" >> android/variables.gradle
          
          # בנייה
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: musical-kids-apk
          path: "**/app-debug.apk"
