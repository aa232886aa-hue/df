name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Final Build
        run: |
          unzip project.zip
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # ניקוי יסודי
          rm -rf android ios node_modules out capacitor.config.*
          mkdir -p out
          echo '<html><body><h1>App Ready</h1></body></html>' > out/index.html
          
          # התקנת המערכת
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out
          npx cap add android
          
          # 💡 במקום להחליף את המניפסט, אנחנו רק משנים את העיצוב לסטנדרטי
          # זה פותר את השגיאה של ה-SplashScreen בלי לשבור את הקובץ
          sed -i 's/Theme.SplashScreen/Theme.AppCompat.Light.NoActionBar/g' android/app/src/main/AndroidManifest.xml
          
          # עדכון גרסאות אנדרואיד בדרך הבטוחה
          sed -i 's/minSdkVersion = .*/minSdkVersion = 24/' android/variables.gradle
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 34/' android/variables.gradle
          
          # בנייה בלי "הזרקות" קוד חיצוניות
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-kids-app
          path: "**/app-debug.apk"
