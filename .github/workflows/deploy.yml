name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip project.zip 

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build Web
        run: |
          CONFIG_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$CONFIG_PATH")
          cd "$PROJECT_DIR"
          find . -name "manifest.webmanifest" -delete || true
          npm install
          npm run build

      - name: Build Android APK
        run: |
          CONFIG_PATH=$(find . -name package.json -print -quit)
          cd $(dirname "$CONFIG_PATH")
          # התקנת כלי המעטפת
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out
          npx cap add android
          npx cap sync
          # בניית ה-APK בפועל
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: "**/app-debug.apk"
