name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Complete Clean and Build
        run: |
          unzip project.zip
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # 1. ניקוי יסודי של זבל מהזיפ שחוסם אותנו
          rm -rf android ios node_modules out
          rm -f capacitor.config.*
          
          # 2. יצירת תיקיית out בסיסית לעקיפת Next.js
          mkdir -p out
          echo '<html><body><h1>App Ready</h1></body></html>' > out/index.html
          
          # 3. התקנה נקייה של המעטפת בלבד (בלי פלאגינים ישנים)
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 4. אתחול המעטפת
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out
          npx cap add android
          
          # 5. הזרקת המניפסט הידני שלך (אם העלית אותו לשורש המאגר)
          if [ -f "../../AndroidManifest.xml" ]; then
            cp "../../AndroidManifest.xml" android/app/src/main/AndroidManifest.xml
          fi
          
          # 6. יצירת קובץ הגדרות בנייה נקי לגמרי
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "com.myapp.kids"
              compileSdk 35
              defaultConfig {
                  applicationId "com.myapp.kids"
                  minSdkVersion 24
                  targetSdkVersion 35
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation project(':capacitor-android')
          }
          EOF
          
          # 7. בנייה סופית (בלי ה-Daemon כדי שלא ייתקע)
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-kids-app
          path: "**/app-debug.apk"
