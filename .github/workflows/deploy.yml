name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Final Build Attempt
        run: |
          unzip project.zip
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # ניקוי
          rm -rf android ios node_modules out capacitor.config.*
          mkdir -p out
          echo '<html><body>App Ready</body></html>' > out/index.html
          
          # התקנה
          npm install @capacitor/core @capacitor/cli @capacitor/android
          echo '{"appId":"com.myapp.kids","appName":"KidsApp","webDir":"out"}' > capacitor.config.json
          npx cap add android
          
          # 💡 יצירת מניפסט תקין בשיטה של "שורה שורה" כדי למנוע שגיאות תווים
          MANIFEST=android/app/src/main/AndroidManifest.xml
          echo '<?xml version="1.0" encoding="utf-8"?>' > $MANIFEST
          echo '<manifest xmlns:android="http://android.com">' >> $MANIFEST
          echo '  <application android:label="KidsApp" android:theme="@style/Theme.AppCompat.Light.NoActionBar">' >> $MANIFEST
          echo '    <activity android:name="com.getcapacitor.BridgeActivity" android:exported="true">' >> $MANIFEST
          echo '      <intent-filter>' >> $MANIFEST
          echo '        <action android:name="android.intent.action.MAIN" />' >> $MANIFEST
          echo '        <category android:name="android.intent.category.LAUNCHER" />' >> $MANIFEST
          echo '      </intent-filter>' >> $MANIFEST
          echo '    </activity>' >> $MANIFEST
          echo '  </application>' >> $MANIFEST
          echo '</manifest>' >> $MANIFEST

          # יצירת קובץ בנייה
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "com.myapp.kids"
              compileSdk 35
              defaultConfig {
                  applicationId "com.myapp.kids"
                  minSdkVersion 24
                  targetSdkVersion 35
              }
          }
          dependencies {
              implementation project(':capacitor-android')
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-kids-app
          path: "**/app-debug.apk"
