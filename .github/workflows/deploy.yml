name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip project.zip 

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          # מוצא איפה נמצא הקוד האמיתי
          CONFIG_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$CONFIG_PATH")
          cd "$PROJECT_DIR"
          
          # ניקוי ובניית ה-HTML
          npm install
          npm run build
          
          # הגדרת המעטפת (Capacitor)
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out
          npx cap add android
          
          # בניית ה-APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-final-app
          path: "**/app-debug.apk"
