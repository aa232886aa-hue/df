name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip project.zip 

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          # איתור תיקיית הפרויקט
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          # ניקוי מוקשים
          find . -name "manifest*" -delete || true
          find . -name "capacitor.config.ts" -delete || true
          
          npm install
          npm run build
          
          # הגדרת המעטפת
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out
          npx cap add android
          
          # הגדרות תמיכה לאחור (אנדרואיד 8.1)
          sed -i 's/minSdkVersion = .*/minSdkVersion = 24/' android/variables.gradle
          sed -i 's/targetSdk = .*/targetSdk = 34/' android/variables.gradle
          sed -i 's/compileSdk = .*/compileSdk = 34/' android/variables.gradle
          
          # בניית ה-APK עם תיקון הרשאות
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
