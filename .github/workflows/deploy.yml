name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Unzip and Build
        run: |
          unzip project.zip
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          
          # שמירת נתיב המניפסט שהעלית ידנית (הוא נמצא בשורש המאגר)
          MANUAL_MANIFEST=$(pwd)/AndroidManifest.xml
          
          cd "$PROJECT_DIR"
          rm -f capacitor.config.ts || true
          
          # יצירת תיקיית out
          mkdir -p out
          echo '<html><body><h1>App Loading</h1></body></html>' > out/index.html
          
          npm install
          npm run build || true
          
          # הקמת המעטפת
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out --confirm
          npx cap add android || true
          
          # העתקה חכמה של המניפסט למקום הנכון
          if [ -f "$MANUAL_MANIFEST" ]; then
            cp "$MANUAL_MANIFEST" android/app/src/main/AndroidManifest.xml
            echo "Manifest injected successfully"
          else
            echo "Warning: Manual manifest not found at $MANUAL_MANIFEST"
          fi
          
          # יצירת קובץ בנייה
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "com.myapp.kids"
              compileSdk 35
              defaultConfig {
                  applicationId "com.myapp.kids"
                  minSdkVersion 24
                  targetSdkVersion 35
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation project(':capacitor-android')
          }
          EOF
          
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-kids-app
          path: "**/app-debug.apk"
