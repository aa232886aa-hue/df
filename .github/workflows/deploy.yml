name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip project.zip 

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          ROOT_PATH=$(find . -name package.json -print -quit)
          PROJECT_DIR=$(dirname "$ROOT_PATH")
          cd "$PROJECT_DIR"
          
          find . -name "manifest*" -delete || true
          find . -name "capacitor.config.ts" -delete || true
          
          npm install
          npm run build
          
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "KidsApp" "com.myapp.kids" --web-dir out
          npx cap add android
          
          # יצירת קובץ הגדרות עם SDK 35 ומינימום 23 (מתאים ל-8.1 ומעלה)
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "com.myapp.kids"
              compileSdk 35
              defaultConfig {
                  applicationId "com.myapp.kids"
                  minSdkVersion 23
                  targetSdkVersion 35
                  versionCode 1
                  versionName "1.0"
              }
              configurations.all {
                  resolutionStrategy {
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                  }
              }
          }
          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.15.0'
              implementation project(':capacitor-android')
              implementation project(':capacitor-cordova-android-plugins')
          }
          EOF
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-kids-app
          path: "**/app-debug.apk"
